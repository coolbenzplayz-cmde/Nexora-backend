# Service Mesh Configuration for 100M+ Users
# Istio-based microservices architecture with full observability

apiVersion: v1
kind: Namespace
metadata:
  name: istio-system
  labels:
    istio-operator-managed: Reconcile
---
# Istio Operator Installation
apiVersion: install.istio.io/v1alpha1
kind: IstioOperator
metadata:
  name: istio-control-plane
  namespace: istio-system
spec:
  profile: default
  components:
    pilot:
      k8s:
        resources:
          requests:
            cpu: 500m
            memory: 2Gi
          limits:
            cpu: 2000m
            memory: 4Gi
    ingressGateways:
    - name: istio-ingressgateway
      enabled: true
      k8s:
        resources:
          requests:
            cpu: 500m
            memory: 2Gi
          limits:
            cpu: 2000m
            memory: 4Gi
        service:
          type: LoadBalancer
          loadBalancerIP: ""
    egressGateways:
    - name: istio-egressgateway
      enabled: true
      k8s:
        resources:
          requests:
            cpu: 200m
            memory: 1Gi
          limits:
            cpu: 500m
            memory: 2Gi
  values:
    global:
      controlPlaneSecurityEnabled: true
      mtls:
        enabled: true
      defaultTTL: 24h
      imagePullPolicy: IfNotPresent
      omitSidecarInjectorConfigMap: true
    pilot:
      autoscaleEnabled: true
      autoscaleMin: 2
      autoscaleMax: 10
      configNamespace: istio-system
      enableProtocolSniffingForInbound: true
      enableProtocolSniffingForOutbound: true
    gateways:
      istio-ingressgateway:
        autoscaleEnabled: true
        autoscaleMin: 3
        autoscaleMax: 20
        type: LoadBalancer
        rollingMaxSurge: 100%
        rollingMaxUnavailable: 25%
        resources:
          requests:
            cpu: 500m
            memory: 2Gi
          limits:
            cpu: 2000m
            memory: 4Gi
    meshConfig:
      accessLogFile: /dev/stdout
      defaultConfig:
        discoveryTimeout: 30s
        proxyStatsMatcher:
          inclusionPrefixes:
          - "cluster_manager"
          - "listener_manager"
          - "http_mixer_filter"
          - "tcp_proxy"
          - "ws_proxy"
          - "grpc_proxy"
          - "tcp_cluster"
          - "dubbo_proxy"
          - "http_proxy"
          - "tcp_proxy"
          - "mongo_proxy"
          - "mysql_proxy"
          - "redis_proxy"
          - "kafka_proxy"
          - "rds_proxy"
        tracing:
          zipkin:
            address: zipkin.istio-system:9411
        proxyMetadata:
          DNS_AGENT: ""
        concurrency: 4
        statsNameUptime: 0.0
        statsNameUptime: 0.0
        statsNameUptime: 0.0
---
# Service Mesh Policies
apiVersion: security.istio.io/v1beta1
kind: PeerAuthentication
metadata:
  name: default
  namespace: istio-system
spec:
  mtls:
    mode: STRICT
---
apiVersion: security.istio.io/v1beta1
kind: PeerAuthentication
metadata:
  name: nexora-mtls
  namespace: nexora-enterprise
spec:
  mtls:
    mode: STRICT
---
# Authorization Policies
apiVersion: security.istio.io/v1beta1
kind: AuthorizationPolicy
metadata:
  name: nexora-api-authz
  namespace: nexora-enterprise
spec:
  selector:
    matchLabels:
      app: nexora-api-gateway
  rules:
  - from:
    - source:
        principals: ["cluster.local/ns/istio-system/sa/istio-ingressgateway-service-account"]
  - to:
    - operation:
        methods: ["GET", "POST", "PUT", "DELETE", "PATCH"]
        paths: ["/api/*"]
  when:
  - key: request.auth.claims[iss]
    values: ["https://nexora.com"]
---
# Traffic Management
apiVersion: networking.istio.io/v1beta1
kind: Gateway
metadata:
  name: nexora-gateway
  namespace: nexora-enterprise
spec:
  selector:
    istio: ingressgateway
  servers:
  - port:
      number: 80
      name: http
      protocol: HTTP
    hosts:
    - "api.nexora.com"
    - "cdn.nexora.com"
    - "admin.nexora.com"
    tls:
      httpsRedirect: true
  - port:
      number: 443
      name: https
      protocol: HTTPS
    hosts:
    - "api.nexora.com"
    - "cdn.nexora.com"
    - "admin.nexora.com"
    tls:
      mode: SIMPLE
      credentialName: nexora-tls
---
# Virtual Service for API Gateway
apiVersion: networking.istio.io/v1beta1
kind: VirtualService
metadata:
  name: nexora-api-vs
  namespace: nexora-enterprise
spec:
  hosts:
  - "api.nexora.com"
  gateways:
  - nexora-gateway
  http:
  - match:
    - uri:
        prefix: /api/v1/
    timeout: 30s
    retries:
      attempts: 3
      perTryTimeout: 10s
      retryOn: 5xx,gateway-error,connect-failure,refused-stream
    fault:
      delay:
        percentage:
          value: 0.1
        fixedDelay: 5s
    route:
    - destination:
        host: nexora-api-gateway-service
        port:
          number: 80
        subset: v1
      weight: 100
    corsPolicy:
      allowOrigin:
      - "*"
      allowMethods:
      - POST
      - GET
      - OPTIONS
      - PUT
      - DELETE
      allowHeaders:
      - authorization
      - content-type
      - accept
      - origin
      - user-agent
      - x-requested-with
      maxAge: 24h
---
# Virtual Service for CDN
apiVersion: networking.istio.io/v1beta1
kind: VirtualService
metadata:
  name: nexora-cdn-vs
  namespace: nexora-enterprise
spec:
  hosts:
  - "cdn.nexora.com"
  gateways:
  - nexora-gateway
  http:
  - match:
    - uri:
        prefix: /cdn/
    timeout: 10s
    retries:
      attempts: 2
      perTryTimeout: 5s
    route:
    - destination:
        host: nexora-cdn-service
        port:
          number: 80
        subset: v1
      weight: 100
    corsPolicy:
      allowOrigin:
      - "*"
      allowMethods:
      - GET
      - HEAD
      - OPTIONS
      maxAge: 24h
---
# Destination Rules
apiVersion: networking.istio.io/v1beta1
kind: DestinationRule
metadata:
  name: nexora-api-dr
  namespace: nexora-enterprise
spec:
  host: nexora-api-gateway-service
  trafficPolicy:
    loadBalancer:
      simple: ROUND_ROBIN
    connectionPool:
      tcp:
        maxConnections: 10000
      http:
        http1MaxPendingRequests: 10000
        maxRequestsPerConnection: 10
    circuitBreaker:
      consecutiveErrors: 3
      interval: 30s
      baseEjectionTime: 30s
      maxEjectionPercent: 50
    outlierDetection:
      consecutiveGatewayErrors: 5
      interval: 30s
      baseEjectionTime: 30s
      maxEjectionPercent: 50
  subsets:
  - name: v1
    labels:
      version: v1
    trafficPolicy:
      loadBalancer:
        simple: ROUND_ROBIN
---
# Service Entry for External Services
apiVersion: networking.istio.io/v1beta1
kind: ServiceEntry
metadata:
  name: external-database
  namespace: nexora-enterprise
spec:
  hosts:
  - postgresql.external.com
  - redis.external.com
  - kafka.external.com
  ports:
  - number: 5432
    name: postgresql
    protocol: TCP
  - number: 6379
    name: redis
    protocol: TCP
  - number: 9092
    name: kafka
    protocol: TCP
  resolution: DNS
  location: MESH_EXTERNAL
---
# Telemetry Configuration
apiVersion: telemetry.istio.io/v1alpha1
kind: Telemetry
metadata:
  name: nexora-telemetry
  namespace: nexora-enterprise
spec:
  metrics:
  - providers:
    - name: prometheus
    overrides:
    - match:
        metric: ALL_METRICS
      tagOverrides:
        destination_service:
          value: "destination.service.name"
        source_app:
          value: "source.app.name"
  accessLogging:
  - providers:
    - name: envoy
  tracing:
  - providers:
    - name: jaeger
    sampling: 100.0
---
# Prometheus Monitoring
apiVersion: v1
kind: ServiceMonitor
metadata:
  name: nexora-mesh-monitor
  namespace: nexio-system
  labels:
    app: istio-proxy
spec:
  selector:
    matchLabels:
      app: istio-proxy
  endpoints:
  - port: http-monitoring
    path: /stats/prometheus
    interval: 15s
---
# Kiali Visualization
apiVersion: v1
kind: Service
metadata:
  name: kiali
  namespace: istio-system
  labels:
    app: kiali
spec:
  ports:
  - port: 20001
    name: http
  selector:
    app: kiali
---
# Jaeger Tracing
apiVersion: v1
kind: Service
metadata:
  name: jaeger
  namespace: istio-system
  labels:
    app: jaeger
spec:
  ports:
  - port: 16686
    name: http
  selector:
    app: jaeger
---
# Grafana Dashboard
apiVersion: v1
kind: Service
metadata:
  name: grafana
  namespace: istio-system
  labels:
    app: grafana
spec:
  ports:
  - port: 3000
    name: http
  selector:
    app: grafana
---
# Service Mesh Policies for Security
apiVersion: security.istio.io/v1beta1
kind: RequestAuthentication
metadata:
  name: jwt-authentication
  namespace: nexora-enterprise
spec:
  selector:
    matchLabels:
      app: nexora-api-gateway
  jwtRules:
  - issuer: "https://nexora.com/auth"
    jwksUri: "https://nexora.com/auth/.well-known/jwks.json"
    forwardOriginalToken: true
---
# Rate Limiting
apiVersion: networking.istio.io/v1beta1
kind: EnvoyFilter
metadata:
  name: rate-limit-filter
  namespace: nexora-enterprise
spec:
  configPatches:
  - applyTo: HTTP_FILTER
    match:
      context: SIDECAR_INBOUND
      listener:
        filterChain:
          filter:
            name: "envoy.filters.network.http_connection_manager"
            subFilter:
              name: "envoy.filters.http.router"
    patch:
      operation: INSERT_BEFORE
      value:
        name: envoy.filters.http.local_ratelimit
        typed_config:
          "@type": type.googleapis.com/envoy.extensions.filters.http.local_ratelimit.v3.LocalRateLimit
          stat_prefix: http_local_rate_limiter
          token_bucket:
            max_tokens: 10000
            tokens_per_fill: 1000
            fill_interval: 1s
          filter_enabled:
            runtime_key: local_rate_limit_enabled
            default_value:
              numerator: 100
              denominator: HUNDRED
          filter_enforced:
            runtime_key: local_rate_limit_enforced
            default_value:
              numerator: 100
              denominator: HUNDRED
---
# Circuit Breaker Configuration
apiVersion: networking.istio.io/v1beta1
kind: EnvoyFilter
metadata:
  name: circuit-breaker-filter
  namespace: nexora-enterprise
spec:
  configPatches:
  - applyTo: CLUSTER
    match:
      cluster:
        service: nexora-api-gateway-service
    patch:
      operation: MERGE
      value:
        connect_timeout: 10s
        per_connection_buffer_limit_bytes: 32768
        max_requests_per_connection: 10000
        circuit_breakers:
          thresholds:
          - priority: DEFAULT
            max_connections: 10000
            max_pending_requests: 10000
            max_requests: 10000
            max_retries: 3
---
# Retry Configuration
apiVersion: networking.istio.io/v1beta1
kind: EnvoyFilter
metadata:
  name: retry-filter
  namespace: nexora-enterprise
spec:
  configPatches:
  - applyTo: VIRTUAL_HOST
    match:
      context: SIDECAR_INBOUND
      routeConfiguration:
        vhost:
          name: "inbound|http|80"
    patch:
      operation: MERGE
      value:
        retry_policy:
          retry_on: 5xx,gateway-error,connect-failure,refused-stream
          num_retries: 3
          per_try_timeout: 10s
          retry_back_off:
            base_interval: 0.1s
            max_interval: 10s
---
# Load Balancing Configuration
apiVersion: networking.istio.io/v1beta1
kind: EnvoyFilter
metadata:
  name: load-balancing-filter
  namespace: nexora-enterprise
spec:
  configPatches:
  - applyTo: CLUSTER
    match:
      cluster:
        service: nexora-api-gateway-service
    patch:
      operation: MERGE
      value:
        lb_policy: ROUND_ROBIN
        load_assignment:
          cluster_name: "outbound|80||nexora-api-gateway-service.nexora-enterprise.svc.cluster.local"
          endpoints:
          - lb_endpoints:
            - endpoint:
                address:
                  socket_address:
                    address: 127.0.0.1
                    port_value: 80
            load_balancing_weight: 100
---
# Health Check Configuration
apiVersion: networking.istio.io/v1beta1
kind: EnvoyFilter
metadata:
  name: health-check-filter
  namespace: nexora-enterprise
spec:
  configPatches:
  - applyTo: CLUSTER
    match:
      cluster:
        service: nexora-api-gateway-service
    patch:
      operation: MERGE
      value:
        health_checks:
          timeout: 5s
          interval: 10s
          unhealthy_threshold: 3
          healthy_threshold: 2
          http_health_check:
            path: "/actuator/health"
---
# Compression Configuration
apiVersion: networking.istio.io/v1beta1
kind: EnvoyFilter
metadata:
  name: compression-filter
  namespace: nexora-enterprise
spec:
  configPatches:
  - applyTo: HTTP_FILTER
    match:
      context: SIDECAR_INBOUND
      listener:
        filterChain:
          filter:
            name: "envoy.filters.network.http_connection_manager"
            subFilter:
              name: "envoy.filters.http.router"
    patch:
      operation: INSERT_BEFORE
      value:
        name: envoy.filters.http.compressor
        typed_config:
          "@type": type.googleapis.com/envoy.extensions.filters.http.compressor.v3.Compressor
          response_direction: BOTH
          compressor_library:
            name: gzip_optimized
            typed_config:
              "@type": type.googleapis.com/envoy.extensions.compression.gzip.compressor.v3.Gzip
              content_length: 1100
              compression_level: BEST_COMPRESSION
---
# WAF Configuration
apiVersion: networking.istio.io/v1beta1
kind: EnvoyFilter
metadata:
  name: waf-filter
  namespace: nexora-enterprise
spec:
  configPatches:
  - applyTo: HTTP_FILTER
    match:
      context: SIDECAR_INBOUND
      listener:
        filterChain:
          filter:
            name: "envoy.filters.network.http_connection_manager"
            subFilter:
              name: "envoy.filters.http.router"
    patch:
      operation: INSERT_BEFORE
      value:
        name: envoy.filters.http.waf
        typed_config:
          "@type": type.googleapis.com/envoy.extensions.filters.http.waf.v3.WAF
          rules:
          - action: BLOCK
            conditions:
            - condition:
                request_uri:
                  safe_regex_match:
                    google_re2: {}
                    regex: "(/admin|/api/v1/admin)"
            - condition:
                request_method:
                  safe_regex_match:
                    google_re2: {}
                    regex: "(DELETE|PUT|POST)"
---
# Service Mesh Observability
apiVersion: v1
kind: ConfigMap
metadata:
  name: istio-telemetry
  namespace: istio-system
data:
  telemetry.yaml: |
    apiVersion: telemetry.istio.io/v1alpha1
    kind: Telemetry
    metadata:
      name: default
    spec:
      metrics:
      - providers:
        - name: prometheus
      accessLogging:
      - providers:
        - name: envoy
      tracing:
      - providers:
        - name: jaeger
---
# Service Mesh Performance Configuration
apiVersion: v1
kind: ConfigMap
metadata:
  name: istio-performance
  namespace: istio-system
data:
  performance.yaml: |
    pilot:
      env:
        PILOT_ENABLE_WORKLOAD_ENTRY: "true"
        PILOT_ENABLE_CROSS_NAMESPACE_WORKLOAD_ENTRY: "true"
        PILOT_ENABLE_HEADLESS_SERVICE_POD_LISTENER: "true"
        PILOT_ENABLE_OPTIMIZED_CONFIG_OBJECTS: "true"
        PILOT_ENABLE_K8S_GATEWAY_API: "true"
        PILOT_ENABLE_K8S_GATEWAY_CONTROLLER: "true"
        PILOT_ENABLE_STATUS: "true"
        PILOT_ENABLE_STATUS_BINARY: "true"
        PILOT_ENABLE_SERVICEENTRY_SELECT_PODS: "true"
        PILOT_ENABLE_QUIC_LISTENER: "true"
        PILOT_ENABLE_ALPN_FILTER: "true"
        PILOT_ENABLE_CONFIG_DISTRIBUTION_TRACKING: "true"
        PILOT_ENABLE_ANALYSIS: "true"
        PILOT_ENABLE_ANALYSIS_RUNTIME: "true"
        PILOT_ENABLE_FAST_XDS: "true"
        PILOT_ENABLE_DIRECTED_PING: "true"
        PILOT_ENABLE_DIRECTED_PING_EXCLUDE: "true"
        PILOT_ENABLE_AGENT_CONTROLLER: "true"
        PILOT_ENABLE_CNI_STATS: "true"
        PILOT_ENABLE_GATEWAY_API_STATUS: "true"
        PILOT_ENABLE_GATEWAY_API_DEPLOYMENT_CONTROLLER: "true"
        PILOT_ENABLE_GATEWAY_API_GROUP: "true"
        PILOT_ENABLE_GATEWAY_API_NAMESPACE: "true"
        PILOT_ENABLE_GATEWAY_API_WORKLOAD_ENTRY: "true"
        PILOT_ENABLE_GATEWAY_API_WORKLOAD_ENTRY_CROSS_NAMESPACE: "true"
        PILOT_ENABLE_GATEWAY_API_PORT_NAME: "true"
        PILOT_ENABLE_GATEWAY_API_PORT_NUMBER: "true"
        PILOT_ENABLE_GATEWAY_API_HOST_PORT: "true"
        PILOT_ENABLE_GATEWAY_API_V1ALPHA1: "true"
        PILOT_ENABLE_GATEWAY_API_V1BETA1: "true"
        PILOT_ENABLE_GATEWAY_API_V1: "true"
        PILOT_ENABLE_GATEWAY_API: "true"
        PILOT_ENABLE_GATEWAY_CONTROLLER: "true"
        PILOT_ENABLE_GATEWAY_DEPLOYMENT_CONTROLLER: "true"
        PILOT_ENABLE_GATEWAY_STATUS_CONTROLLER: "true"
        PILOT_ENABLE_GATEWAY_API_CONTROLLER: "true"
        PILOT_ENABLE_GATEWAY_API_DEPLOYMENT_CONTROLLER: "true"
        PILOT_ENABLE_GATEWAY_STATUS_CONTROLLER: "true"
        PILOT_ENABLE_GATEWAY_API_CONTROLLER: "true"
        PILOT_ENABLE_GATEWAY_API_DEPLOYMENT_CONTROLLER: "true"
        PILOT_ENABLE_GATEWAY_STATUS_CONTROLLER: "true"
