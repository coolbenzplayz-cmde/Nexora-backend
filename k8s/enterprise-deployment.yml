apiVersion: v1
kind: Namespace
metadata:
  name: nexora-enterprise
---
# API Gateway Deployment
apiVersion: apps/v1
kind: Deployment
metadata:
  name: nexora-api-gateway
  namespace: nexora-enterprise
  labels:
    app: nexora-api-gateway
    version: v1
spec:
  replicas: 50
  selector:
    matchLabels:
      app: nexora-api-gateway
  template:
    metadata:
      labels:
        app: nexora-api-gateway
        version: v1
    spec:
      containers:
      - name: nexora-api-gateway
        image: nexora/api-gateway:enterprise
        ports:
        - containerPort: 8080
        env:
        - name: SPRING_PROFILES_ACTIVE
          value: "enterprise"
        - name: DATABASE_URL
          valueFrom:
            secretKeyRef:
              name: nexora-secrets
              key: database-master-url
        - name: DATABASE_READ_URL
          valueFrom:
            secretKeyRef:
              name: nexora-secrets
              key: database-replica-url
        - name: REDIS_CLUSTER_URL
          valueFrom:
            secretKeyRef:
              name: nexora-secrets
              key: redis-cluster-url
        - name: KAFKA_BOOTSTRAP_SERVERS
          valueFrom:
            configMapKeyRef:
              name: nexora-config
              key: kafka-bootstrap-servers
        - name: ELASTICSEARCH_URL
          valueFrom:
            configMapKeyRef:
              name: nexora-config
              key: elasticsearch-url
        - name: JVM_OPTS
          value: "-Xms4g -Xmx4g -XX:+UseG1GC -XX:MaxGCPauseMillis=200"
        resources:
          requests:
            memory: "4Gi"
            cpu: "2000m"
          limits:
            memory: "8Gi"
            cpu: "4000m"
        livenessProbe:
          httpGet:
            path: /actuator/health
            port: 8080
          initialDelaySeconds: 60
          periodSeconds: 30
          timeoutSeconds: 10
        readinessProbe:
          httpGet:
            path: /actuator/health/readiness
            port: 8080
          initialDelaySeconds: 30
          periodSeconds: 10
          timeoutSeconds: 5
        volumeMounts:
        - name: config-volume
          mountPath: /app/config
        - name: cache-volume
          mountPath: /app/cache
      volumes:
      - name: config-volume
        configMap:
          name: nexora-config
      - name: cache-volume
        emptyDir:
          sizeLimit: 2Gi
      affinity:
        podAntiAffinity:
          preferredDuringSchedulingIgnoredDuringExecution:
          - weight: 100
            podAffinityTerm:
              labelSelector:
                matchExpressions:
                - key: app
                  operator: In
                  values:
                  - nexora-api-gateway
              topologyKey: kubernetes.io/hostname
---
# API Gateway Service
apiVersion: v1
kind: Service
metadata:
  name: nexora-api-gateway-service
  namespace: nexora-enterprise
spec:
  selector:
    app: nexora-api-gateway
  ports:
  - protocol: TCP
    port: 80
    targetPort: 8080
  type: ClusterIP
---
# API Gateway HPA
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: nexora-api-gateway-hpa
  namespace: nexora-enterprise
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: nexora-api-gateway
  minReplicas: 50
  maxReplicas: 200
  metrics:
  - type: Resource
    resource:
      name: cpu
      target:
        type: Utilization
        averageUtilization: 70
  - type: Resource
    resource:
      name: memory
      target:
        type: Utilization
        averageUtilization: 80
  - type: Pods
    pods:
      metric:
        name: http_requests_per_second
      target:
        type: AverageValue
        averageValue: "1000"
  behavior:
    scaleDown:
      stabilizationWindowSeconds: 300
      policies:
      - type: Percent
        value: 10
        periodSeconds: 60
    scaleUp:
      stabilizationWindowSeconds: 60
      policies:
      - type: Percent
        value: 50
        periodSeconds: 60
---
# User Service Deployment
apiVersion: apps/v1
kind: Deployment
metadata:
