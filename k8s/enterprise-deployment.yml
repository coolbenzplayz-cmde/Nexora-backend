---
# Global Ingress with Rate Limiting
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: nexora-global-ingress
  namespace: nexora-enterprise
  annotations:
    kubernetes.io/ingress.class: nginx
    cert-manager.io/cluster-issuer: letsencrypt-prod
    nginx.ingress.kubernetes.io/rate-limit: "1000"
    nginx.ingress.kubernetes.io/rate-limit-window: "1m"
    nginx.ingress.kubernetes.io/client-body-buffer-size: "16k"
    nginx.ingress.kubernetes.io/proxy-buffering: "on"
    nginx.ingress.kubernetes.io/proxy-buffer-size: "16k"
    nginx.ingress.kubernetes.io/proxy-buffers-number: "4"
    nginx.ingress.kubernetes.io/upstream-hash-by: "$remote_addr"
    nginx.ingress.kubernetes.io/load-balance: "round_robin"
    nginx.ingress.kubernetes.io/connection-proxy-header: "keep-alive"
    nginx.ingress.kubernetes.io/limit-connections: "100"
    nginx.ingress.kubernetes.io/limit-connections-per-second: "50"
    nginx.ingress.kubernetes.io/limit-burst: "100"
    nginx.ingress.kubernetes.io/limit-rps: "1000"
spec:
  tls:
  - hosts:
    - api.nexora.com
    - cdn.nexora.com
    - admin.nexora.com
    secretName: nexora-global-tls
  rules:
  - host: api.nexora.com
    http:
      paths:
      - path: /
        pathType: Prefix
        backend:
          service:
            name: nexora-api-gateway-service
            port:
              number: 80
  - host: cdn.nexora.com
    http:
      paths:
      - path: /
        pathType: Prefix
        backend:
          service:
            name: content-service
            port:
              number: 80
  - host: admin.nexora.com
    http:
      paths:
      - path: /
        pathType: Prefix
        backend:
          service:
            name: nexora-api-gateway-service
            port:
              number: 80
---
# Pod Disruption Budgets
apiVersion: policy/v1
kind: PodDisruptionBudget
metadata:
  name: nexora-api-gateway-pdb
  namespace: nexora-enterprise
spec:
  minAvailable: 25
  selector:
    matchLabels:
      app: nexora-api-gateway
---
apiVersion: policy/v1
kind: PodDisruptionBudget
metadata:
  name: user-service-pdb
  namespace: nexora-enterprise
spec:
  minAvailable: 50
  selector:
    matchLabels:
      app: user-service
---
apiVersion: policy/v1
kind: PodDisruptionBudget
metadata:
  name: content-service-pdb
  namespace: nexora-enterprise
spec:
  minAvailable: 75
  selector:
    matchLabels:
      app: content-service
---
apiVersion: policy/v1
kind: PodDisruptionBudget
metadata:
  name: payment-service-pdb
  namespace: nexora-enterprise
spec:
  minAvailable: 62
  selector:
    matchLabels:
      app: payment-service
---
# Network Policies
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: nexora-network-policy
  namespace: nexora-enterprise
spec:
  podSelector: {}
  policyTypes:
  - Ingress
  - Egress
  ingress:
  - from:
    - namespaceSelector:
        matchLabels:
          name: ingress-nginx
    - podSelector:
        matchLabels:
          app: nexora-api-gateway
    - podSelector:
        matchLabels:
          app: user-service
    - podSelector:
        matchLabels:
          app: content-service
    - podSelector:
        matchLabels:
          app: payment-service
    - podSelector:
        matchLabels:
          app: notification-service
    - podSelector:
        matchLabels:
          app: analytics-service
  egress:
  - to:
    - namespaceSelector:
        matchLabels:
          name: nexora-enterprise
  - to: []
    ports:
    - protocol: TCP
      port: 53
    - protocol: UDP
      port: 53
  - to: []
    ports:
    - protocol: TCP
      port: 443
    - protocol: TCP
      port: 80
---
# Resource Quotas
apiVersion: v1
kind: ResourceQuota
metadata:
  name: nexora-resource-quota
  namespace: nexora-enterprise
spec:
  hard:
    requests.cpu: "1000"
    requests.memory: 4000Gi
    limits.cpu: "2000"
    limits.memory: 8000Gi
    persistentvolumeclaims: "100"
    services: "50"
    secrets: "100"
    configmaps: "100"
---
# Limit Ranges
apiVersion: v1
kind: LimitRange
metadata:
  name: nexora-limit-range
  namespace: nexora-enterprise
spec:
  limits:
  - default:
      cpu: "4000m"
      memory: "8Gi"
    defaultRequest:
      cpu: "2000m"
      memory: "4Gi"
    type: Container
  - max:
      cpu: "8000m"
      memory: "16Gi"
    min:
      cpu: "1000m"
      memory: "2Gi"
    type: Container
