version: '3.9'

services:

  # 🐘 POSTGRES DATABASE
  postgres:
    image: postgres:16
    container_name: nexora-postgres
    restart: always
    environment:
      POSTGRES_DB: nexora
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  # 🔴 REDIS CACHE
  redis:
    image: redis:7
    container_name: nexora-redis
    restart: always
    ports:
      - "6379:6379"

  # 📡 KAFKA
  zookeeper:
    image: confluentinc/cp-zookeeper:7.5.0
    container_name: nexora-zookeeper
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000
    ports:
      - "2181:2181"

  kafka:
    image: confluentinc/cp-kafka:7.5.0
    container_name: nexora-kafka
    depends_on:
      - zookeeper
    ports:
      - "9092:9092"
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://localhost:9092
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1

  # 🌐 OPTIONAL: KAFKA UI (VERY USEFUL)
  kafka-ui:
    image: provectuslabs/kafka-ui:latest
    container_name: nexora-kafka-ui
    depends_on:
      - kafka
    ports:
      - "8085:8080"
    environment:
      KAFKA_CLUSTERS_0_NAME: local
      KAFKA_CLUSTERS_0_BOOTSTRAPSERVERS: kafka:9092

  # 🧠 BACKEND (SPRING BOOT)
  backend:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: nexora-backend
    restart: always
    depends_on:
      - postgres
      - redis
      - kafka
    ports:
      - "8080:8080"
    environment:
      DB_HOST: postgres
      DB_PORT: 5432
      DB_NAME: nexora
      DB_USERNAME: postgres
      DB_PASSWORD: postgres

      REDIS_HOST: redis
      REDIS_PORT: 6379

      KAFKA_BOOTSTRAP_SERVERS: kafka:9092

      JWT_SECRET: your-secret-key

  # 🎨 FRONTEND (REACT)
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: nexora-frontend
    restart: always
    ports:
      - "3000:3000"
    environment:
      VITE_API_URL: http://backend:8080

volumes:
  postgres_data:

  # 🐘 MONGODB (Optional for flexible data)
  mongodb:
    image: mongo:7
    container_name: nexora-mongodb
    restart: always
    ports:
      - "27017:27017"
    environment:
      MONGO_INITDB_ROOT_USERNAME: nexora
      MONGO_INITDB_ROOT_PASSWORD: nexora
    volumes:
      - mongodb_data:/data/db

  # 📊 PROMETHEUS METRICS
  prometheus:
    image: prom/prometheus:latest
    container_name: nexora-prometheus
    restart: always
    ports:
      - "9090:9090"
    volumes:
      - ./prometheus.yml:/etc/prometheus/prometheus.yml
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'

  # 📈 GRAFANA DASHBOARDS
  grafana:
    image: grafana/grafana:latest
    container_name: nexora-grafana
    restart: always
    ports:
      - "3001:3000"
    environment:
      GF_SECURITY_ADMIN_USER: admin
      GF_SECURITY_ADMIN_PASSWORD: admin
    depends_on:
      - prometheus

  # 🌐 NGINX REVERSE PROXY
  nginx:
    image: nginx:alpine
    container_name: nexora-nginx
    restart: always
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
      - nginx_data:/var/cache/nginx
    depends_on:
      - backend
      - frontend
