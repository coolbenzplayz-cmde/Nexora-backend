---
# Global Content Distribution Network
apiVersion: v1
kind: Service
metadata:
  name: nexora-cdn-service
  namespace: nexora-global
  labels:
    app: nexora-cdn
    tier: frontend
spec:
  selector:
    app: nexora-cdn
  ports:
  - name: http
    port: 80
    targetPort: 80
  - name: https
    port: 443
    targetPort: 443
  type: ClusterIP
---
# CDN Edge Nodes (North America)
apiVersion: apps/v1
kind: Deployment
metadata:
  name: nexora-cdn-na
  namespace: nexora-na
  labels:
    app: nexora-cdn
    region: north-america
spec:
  replicas: 50
  selector:
    matchLabels:
      app: nexora-cdn
      region: north-america
  template:
    metadata:
      labels:
        app: nexora-cdn
        region: north-america
    spec:
      containers:
      - name: nexora-cdn
        image: nexora/cdn:enterprise
        ports:
        - containerPort: 80
        - containerPort: 443
        env:
        - name: REGION
          value: "north-america"
        - name: CACHE_SIZE
          value: "500GB"
        - name: CDN_ENDPOINT
          value: "cdn-na.nexora.com"
        resources:
          requests:
            memory: "2Gi"
            cpu: "1000m"
          limits:
            memory: "4Gi"
            cpu: "2000m"
        volumeMounts:
        - name: cache-volume
          mountPath: /var/cache/nginx
      volumes:
      - name: cache-volume
        emptyDir:
          sizeLimit: 500Gi
---
# CDN Edge Nodes (Europe)
apiVersion: apps/v1
