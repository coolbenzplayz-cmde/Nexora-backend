apiVersion: apps/v1
kind: Deployment
metadata:
  name: nexora-backend
  namespace: nexora
spec:
  replicas: 2
  selector:
    matchLabels:
      app: nexora-backend
  template:
    metadata:
      labels:
        app: nexora-backend
    spec:
      containers:
      - name: backend
        image: nexora-backend:latest
        ports:
        - containerPort: 8080
        env:
        - name: SPRING_PROFILES_ACTIVE
          value: "production"
        - name: DATABASE_URL
          valueFrom:
            secretKeyRef:
              name: nexora-secrets
              key: database-url
        - name: JWT_SECRET
          valueFrom:
            secretKeyRef:
              name: nexora-secrets
              key: jwt-secret
        - name: REDIS_URL
          value: "redis:6379"
        - name: KAFKA_URL
          value: "kafka:9092"
        resources:
          requests:
            memory: "512Mi"
            cpu: "250m"
          limits:
            memory: "1Gi"
            cpu: "1000m"
        livenessProbe:
          httpGet:
            path: /api/v1/health
            port: 8080
          initialDelaySeconds: 60
          periodSeconds: 10
        readinessProbe:
          httpGet:
            path: /api/v1/health
            port: 8080
          initialDelaySeconds: 30
          periodSeconds: 5
---
apiVersion: v1
kind: Service
metadata:
  name: nexora-backend
  namespace: nexora
spec:
  selector:
    app: nexora-backend
  ports:
  - port: 80
    targetPort: 8080
  type: ClusterIP
