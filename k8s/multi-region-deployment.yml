# Multi-Region Deployment Configuration for 100M+ Users
# Global CDN and Geographic Distribution

apiVersion: v1
kind: Namespace
metadata:
  name: nexora-global
---
# North America Region (Primary)
apiVersion: v1
kind: Namespace
metadata:
  name: nexora-na
  labels:
    region: north-america
    primary: "true"
---
# Europe Region
apiVersion: v1
kind: Namespace
metadata:
  name: nexora-eu
  labels:
    region: europe
    primary: "false"
---
# Asia Pacific Region
apiVersion: v1
kind: Namespace
metadata:
  name: nexora-apac
  labels:
    region: asia-pacific
    primary: "false"
---
# Global CDN Configuration
apiVersion: networking.istio.io/v1beta1
kind: Gateway
metadata:
  name: nexora-global-gateway
  namespace: nexora-global
spec:
  selector:
    istio: ingressgateway
  servers:
  - port:
      number: 80
      name: http
      protocol: HTTP
    hosts:
    - "*.nexora.com"
    tls:
      httpsRedirect: true
  - port:
      number: 443
      name: https
      protocol: HTTPS
    hosts:
    - "*.nexora.com"
    tls:
      mode: SIMPLE
      credentialName: nexora-global-tls
---
# Global Virtual Service with Geo-Based Routing
apiVersion: networking.istio.io/v1beta1
kind: VirtualService
metadata:
  name: nexora-global-vs
  namespace: nexora-global
spec:
  hosts:
  - "api.nexora.com"
  - "cdn.nexora.com"
  - "admin.nexora.com"
  gateways:
  - nexora-global-gateway
  http:
  - match:
    - uri:
        prefix: /api/v1/
    fault:
      delay:
        percentage:
          value: 0.1
        fixedDelay: 5s
    retries:
      attempts: 3
      perTryTimeout: 2s
      retryOn: 5xx,gateway-error,connect-failure,refused-stream
    route:
    - destination:
        host: nexora-api-gateway-service
        port:
          number: 80
        subset: primary
      weight: 60
    - destination:
        host: nexora-api-gateway-service
        port:
          number: 80
        subset: secondary
      weight: 40
    timeout: 30s
  - match:
    - uri:
        prefix: /cdn/
    route:
    - destination:
        host: content-service
        port:
          number: 80
        subset: cdn-primary
      weight: 70
    - destination:
        host: content-service
        port:
          number: 80
        subset: cdn-secondary
      weight: 30
    timeout: 10s
---
# North America API Gateway Deployment
apiVersion: apps/v1
kind: Deployment
metadata:
  name: nexora-api-gateway-na
  namespace: nexora-na
  labels:
    app: nexora-api-gateway
    region: north-america
    version: v1
spec:
  replicas: 100
  selector:
    matchLabels:
      app: nexora-api-gateway
      region: north-america
  template:
    metadata:
      labels:
        app: nexora-api-gateway
        region: north-america
        version: v1
    spec:
      affinity:
        nodeAffinity:
          requiredDuringSchedulingIgnoredDuringExecution:
            nodeSelectorTerms:
            - matchExpressions:
              - key: topology.kubernetes.io/zone
                operator: In
                values:
                - us-east-1a
                - us-east-1b
                - us-east-1c
                - us-west-2a
                - us-west-2b
        podAntiAffinity:
          preferredDuringSchedulingIgnoredDuringExecution:
          - weight: 100
            podAffinityTerm:
              labelSelector:
                matchExpressions:
                - key: app
                  operator: In
                  values:
                  - nexora-api-gateway
              topologyKey: kubernetes.io/hostname
      containers:
      - name: nexora-api-gateway
        image: nexora/api-gateway:enterprise
        ports:
        - containerPort: 8080
        env:
        - name: SPRING_PROFILES_ACTIVE
          value: "enterprise,na"
        - name: DATABASE_URL
          valueFrom:
            secretKeyRef:
              name: nexora-secrets-na
              key: database-master-url
        - name: REDIS_CLUSTER_URL
          valueFrom:
            secretKeyRef:
              name: nexora-secrets-na
              key: redis-cluster-url
        - name: KAFKA_BOOTSTRAP_SERVERS
          valueFrom:
            configMapKeyRef:
              name: nexora-config-na
              key: kafka-bootstrap-servers
        - name: REGION
          value: "north-america"
        - name: JVM_OPTS
          value: "-Xms4g -Xmx4g -XX:+UseG1GC -XX:MaxGCPauseMillis=200"
        resources:
          requests:
            memory: "4Gi"
            cpu: "2000m"
          limits:
            memory: "8Gi"
            cpu: "4000m"
        livenessProbe:
          httpGet:
            path: /actuator/health
            port: 8080
          initialDelaySeconds: 60
          periodSeconds: 30
        readinessProbe:
          httpGet:
            path: /actuator/health/readiness
            port: 8080
          initialDelaySeconds: 30
          periodSeconds: 10
---
