version: '3.8'

services:
  # API Gateway Cluster
  api-gateway-1:
    build:
      context: .
      dockerfile: Dockerfile.prod
    environment:
      - SPRING_PROFILES_ACTIVE=enterprise
      - DATABASE_URL=postgresql://postgres-master:5432/nexora
      - DATABASE_READ_URL=postgresql://postgres-replica-1:5432/nexora,postgresql://postgres-replica-2:5432/nexora
      - REDIS_CLUSTER_URL=redis://redis-cluster-1:6379,redis://redis-cluster-2:6379,redis://redis-cluster-3:6379
      - KAFKA_BOOTSTRAP_SERVERS=kafka-1:9092,kafka-2:9092,kafka-3:9092
      - ELASTICSEARCH_URL=http://es-master:9200,http://es-data-1:9200,http://es-data-2:9200
      - JVM_OPTS=-Xms4g -Xmx4g -XX:+UseG1GC -XX:MaxGCPauseMillis=200
    deploy:
      replicas: 10
      resources:
        limits:
          memory: 8G
          cpus: '4.0'
        reservations:
          memory: 4G
          cpus: '2.0'
    depends_on:
      - postgres-master
      - redis-cluster-1
      - kafka-1
      - es-master
    networks:
      - nexora-network
    restart: unless-stopped

  # Database Cluster (PostgreSQL)
  postgres-master:
    image: postgres:15-alpine
    environment:
      - POSTGRES_DB=nexora
      - POSTGRES_USER=nexora
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
      - POSTGRES_REPLICATION_USER=replicator
      - POSTGRES_REPLICATION_PASSWORD=${REPLICATION_PASSWORD}
    volumes:
      - postgres_master_data:/var/lib/postgresql/data
      - ./scripts/init-master.sql:/docker-entrypoint-initdb.d/init-master.sql
      - ./config/postgresql.conf:/etc/postgresql/postgresql.conf
    deploy:
      resources:
        limits:
          memory: 128G
          cpus: '32.0'
        reservations:
          memory: 64G
          cpus: '16.0'
    networks:
      - nexora-network
    restart: unless-stopped

  postgres-replica-1:
    image: postgres:15-alpine
    environment:
      - POSTGRES_DB=nexora
      - POSTGRES_USER=nexora
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
      - PGUSER=postgres
      - POSTGRES_MASTER_SERVICE=postgres-master
      - POSTGRES_REPLICATION_USER=replicator
      - POSTGRES_REPLICATION_PASSWORD=${REPLICATION_PASSWORD}
    volumes:
      - postgres_replica1_data:/var/lib/postgresql/data
      - ./scripts/init-replica.sql:/docker-entrypoint-initdb.d/init-replica.sql
    depends_on:
      - postgres-master
    deploy:
      resources:
        limits:
          memory: 64G
          cpus: '16.0'
        reservations:
          memory: 32G
          cpus: '8.0'
    networks:
      - nexora-network
    restart: unless-stopped

  postgres-replica-2:
    image: postgres:15-alpine
    environment:
      - POSTGRES_DB=nexora
      - POSTGRES_USER=nexora
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
      - PGUSER=postgres
      - POSTGRES_MASTER_SERVICE=postgres-master
      - POSTGRES_REPLICATION_USER=replicator
      - POSTGRES_REPLICATION_PASSWORD=${REPLICATION_PASSWORD}
    volumes:
      - postgres_replica2_data:/var/lib/postgresql/data
      - ./scripts/init-replica.sql:/docker-entrypoint-initdb.d/init-replica.sql
    depends_on:
      - postgres-master
    deploy:
      resources:
        limits:
          memory: 64G
          cpus: '16.0'
        reservations:
          memory: 32G
          cpus: '8.0'
    networks:
      - nexora-network
    restart: unless-stopped

  # Redis Cluster
  redis-cluster-1:
    image: redis:7-alpine
    command: redis-server --cluster-enabled yes --cluster-config-file nodes.conf --cluster-node-timeout 5000 --appendonly yes --maxmemory 32gb --maxmemory-policy allkeys-lru
    volumes:
      - redis_cluster1_data:/data
    deploy:
      resources:
        limits:
          memory: 64G
          cpus: '8.0'
        reservations:
          memory: 32G
          cpus: '4.0'
    networks:
      - nexora-network
    restart: unless-stopped

  redis-cluster-2:
    image: redis:7-alpine
    command: redis-server --cluster-enabled yes --cluster-config-file nodes.conf --cluster-node-timeout 5000 --appendonly yes --maxmemory 32gb --maxmemory-policy allkeys-lru
    volumes:
      - redis_cluster2_data:/data
    deploy:
      resources:
        limits:
          memory: 64G
          cpus: '8.0'
        reservations:
          memory: 32G
          cpus: '4.0'
    networks:
      - nexora-network
    restart: unless-stopped

  redis-cluster-3:
    image: redis:7-alpine
    command: redis-server --cluster-enabled yes --cluster-config-file nodes.conf --cluster-node-timeout 5000 --appendonly yes --maxmemory 32gb --maxmemory-policy allkeys-lru
    volumes:
      - redis_cluster3_data:/data
    deploy:
      resources:
        limits:
          memory: 64G
          cpus: '8.0'
        reservations:
          memory: 32G
          cpus: '4.0'
    networks:
      - nexora-network
    restart: unless-stopped

  # Kafka Cluster
  kafka-1:
    image: confluentinc/cp-kafka:7.4.0
    environment:
      KAFKA_ZOOKEEPER_CONNECT: zookeeper-1:2181,zookeeper-2:2181,zookeeper-3:2181
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka-1:9092
      KAFKA_BROKER_ID: 1
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 3
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 3
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 2
      KAFKA_NUM_PARTITIONS: 100
      KAFKA_DEFAULT_REPLICATION_FACTOR: 3
      KAFKA_MIN_INSYNC_REPLICAS: 2
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: true
      KAFKA_LOG_RETENTION_HOURS: 168
      KAFKA_LOG_SEGMENT_BYTES: 1073741824
      KAFKA_LOG_RETENTION_BYTES: 53687091200
      KAFKA_LOG_RETENTION_CHECK_INTERVAL_MS: 300000
      KAFKA_JVM_PERFORMANCE_OPTS: -server -XX:+UseG1GC -XX:MaxGCPauseMillis=20 -XX:InitiatingHeapOccupancyPercent=35
    volumes:
      - kafka1_data:/var/lib/kafka/data
    deploy:
      resources:
        limits:
          memory: 32G
          cpus: '8.0'
        reservations:
          memory: 16G
          cpus: '4.0'
    depends_on:
      - zookeeper-1
      - zookeeper-2
      - zookeeper-3
    networks:
      - nexora-network
    restart: unless-stopped

  kafka-2:
    image: confluentinc/cp-kafka:7.4.0
    environment:
      KAFKA_ZOOKEEPER_CONNECT: zookeeper-1:2181,zookeeper-2:2181,zookeeper-3:2181
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka-2:9092
      KAFKA_BROKER_ID: 2
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 3
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 3
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 2
      KAFKA_NUM_PARTITIONS: 100
      KAFKA_DEFAULT_REPLICATION_FACTOR: 3
      KAFKA_MIN_INSYNC_REPLICAS: 2
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: true
      KAFKA_JVM_PERFORMANCE_OPTS: -server -XX:+UseG1GC -XX:MaxGCPauseMillis=20 -XX:InitiatingHeapOccupancyPercent=35
    volumes:
      - kafka2_data:/var/lib/kafka/data
    deploy:
      resources:
        limits:
          memory: 32G
          cpus: '8.0'
        reservations:
          memory: 16G
          cpus: '4.0'
    depends_on:
      - zookeeper-1
      - zookeeper-2
      - zookeeper-3
    networks:
      - nexora-network
    restart: unless-stopped

  kafka-3:
    image: confluentinc/cp-kafka:7.4.0
    environment:
      KAFKA_ZOOKEEPER_CONNECT: zookeeper-1:2181,zookeeper-2:2181,zookeeper-3:2181
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka-3:9092
      KAFKA_BROKER_ID: 3
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 3
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 3
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 2
      KAFKA_NUM_PARTITIONS: 100
      KAFKA_DEFAULT_REPLICATION_FACTOR: 3
      KAFKA_MIN_INSYNC_REPLICAS: 2
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: true
      KAFKA_JVM_PERFORMANCE_OPTS: -server -XX:+UseG1GC -XX:MaxGCPauseMillis=20 -XX:InitiatingHeapOccupancyPercent=35
    volumes:
      - kafka3_data:/var/lib/kafka/data
    deploy:
      resources:
        limits:
          memory: 32G
          cpus: '8.0'
        reservations:
          memory: 16G
          cpus: '4.0'
    depends_on:
      - zookeeper-1
      - zookeeper-2
      - zookeeper-3
    networks:
      - nexora-network
    restart: unless-stopped

  # Zookeeper Ensemble
  zookeeper-1:
    image: confluentinc/cp-zookeeper:7.4.0
    environment:
      ZOOKEEPER_SERVER_ID: 1
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000
      ZOOKEEPER_SERVERS: zookeeper-1:2888:3888;zookeeper-2:2888:3888;zookeeper-3:2888:3888
    volumes:
      - zookeeper1_data:/var/lib/zookeeper/data
      - zookeeper1_logs:/var/lib/zookeeper/log
    deploy:
      resources:
        limits:
          memory: 4G
          cpus: '2.0'
    networks:
      - nexora-network
    restart: unless-stopped

  zookeeper-2:
    image: confluentinc/cp-zookeeper:7.4.0
    environment:
      ZOOKEEPER_SERVER_ID: 2
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000
      ZOOKEEPER_SERVERS: zookeeper-1:2888:3888;zookeeper-2:2888:3888;zookeeper-3:2888:3888
    volumes:
      - zookeeper2_data:/var/lib/zookeeper/data
      - zookeeper2_logs:/var/lib/zookeeper/log
    deploy:
      resources:
        limits:
          memory: 4G
          cpus: '2.0'
    networks:
      - nexora-network
    restart: unless-stopped

  zookeeper-3:
    image: confluentinc/cp-zookeeper:7.4.0
    environment:
      ZOOKEEPER_SERVER_ID: 3
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000
      ZOOKEEPER_SERVERS: zookeeper-1:2888:3888;zookeeper-2:2888:3888;zookeeper-3:2888:3888
    volumes:
      - zookeeper3_data:/var/lib/zookeeper/data
      - zookeeper3_logs:/var/lib/zookeeper/log
    deploy:
      resources:
        limits:
          memory: 4G
          cpus: '2.0'
    networks:
      - nexora-network
    restart: unless-stopped

  # Elasticsearch Cluster
  es-master:
    image: docker.elastic.co/elasticsearch/elasticsearch:8.8.0
    environment:
      - node.name=es-master
      - node.roles=master
      - cluster.name=nexora-cluster
      - discovery.seed_hosts=es-master,es-data-1,es-data-2
      - cluster.initial_master_nodes=es-master
      - xpack.security.enabled=false
      - "ES_JAVA_OPTS=-Xms8g -Xmx8g -XX:+UseG1GC -XX:MaxGCPauseMillis=200"
      - bootstrap.memory_lock=true
    ulimits:
      memlock:
        soft: -1
        hard: -1
    volumes:
      - es_master_data:/usr/share/elasticsearch/data
    deploy:
      resources:
        limits:
          memory: 16G
          cpus: '8.0'
        reservations:
          memory: 8G
          cpus: '4.0'
    networks:
      - nexora-network
    restart: unless-stopped

  es-data-1:
    image: docker.elastic.co/elasticsearch/elasticsearch:8.8.0
    environment:
      - node.name=es-data-1
      - node.roles=data,ingest
      - cluster.name=nexora-cluster
      - discovery.seed_hosts=es-master,es-data-1,es-data-2
      - cluster.initial_master_nodes=es-master
      - xpack.security.enabled=false
      - "ES_JAVA_OPTS=-Xms16g -Xmx16g -XX:+UseG1GC -XX:MaxGCPauseMillis=200"
      - bootstrap.memory_lock=true
    ulimits:
      memlock:
        soft: -1
        hard: -1
    volumes:
      - es_data1_data:/usr/share/elasticsearch/data
    deploy:
      resources:
        limits:
          memory: 32G
          cpus: '16.0'
        reservations:
          memory: 16G
          cpus: '8.0'
    networks:
      - nexora-network
    restart: unless-stopped

  es-data-2:
    image: docker.elastic.co/elasticsearch/elasticsearch:8.8.0
    environment:
      - node.name=es-data-2
      - node.roles=data,ingest
      - cluster.name=nexora-cluster
      - discovery.seed_hosts=es-master,es-data-1,es-data-2
      - cluster.initial_master_nodes=es-master
      - xpack.security.enabled=false
      - "ES_JAVA_OPTS=-Xms16g -Xmx16g -XX:+UseG1GC -XX:MaxGCPauseMillis=200"
      - bootstrap.memory_lock=true
    ulimits:
      memlock:
        soft: -1
        hard: -1
    volumes:
      - es_data2_data:/usr/share/elasticsearch/data
    deploy:
      resources:
        limits:
          memory: 32G
          cpus: '16.0'
        reservations:
          memory: 16G
          cpus: '8.0'
    networks:
      - nexora-network
    restart: unless-stopped

  # Global Load Balancer
  nginx-enterprise:
    image: nginx:alpine
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./config/nginx-enterprise.conf:/etc/nginx/nginx.conf
      - ./config/ssl:/etc/nginx/ssl
      - ./config/cache:/var/cache/nginx
    depends_on:
      - api-gateway-1
    deploy:
      resources:
        limits:
          memory: 8G
          cpus: '4.0'
        reservations:
          memory: 4G
          cpus: '2.0'
    networks:
      - nexora-network
    restart: unless-stopped

  # Monitoring Stack
  prometheus-enterprise:
    image: prom/prometheus:latest
    ports:
      - "9090:9090"
    volumes:
      - ./config/prometheus-enterprise.yml:/etc/prometheus/prometheus.yml
      - prometheus_enterprise_data:/prometheus
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
      - '--storage.tsdb.retention.time=30d'
      - '--web.enable-lifecycle'
      - '--web.console.libraries=/etc/prometheus/console_libraries'
      - '--web.console.templates=/etc/prometheus/consoles'
      - '--query.max-concurrency=25'
      - '--query.timeout=2m'
    deploy:
      resources:
        limits:
          memory: 16G
          cpus: '8.0'
        reservations:
          memory: 8G
          cpus: '4.0'
    networks:
      - nexora-network
    restart: unless-stopped

  grafana-enterprise:
    image: grafana/grafana:latest
    ports:
      - "3000:3000"
    environment:
      - GF_SECURITY_ADMIN_PASSWORD=${GRAFANA_PASSWORD}
      - GF_INSTALL_PLUGINS=grafana-piechart-panel,grafana-worldmap-panel
    volumes:
      - grafana_enterprise_data:/var/lib/grafana
      - ./config/grafana/dashboards:/etc/grafana/provisioning/dashboards
      - ./config/grafana/datasources:/etc/grafana/provisioning/datasources
    deploy:
      resources:
        limits:
          memory: 8G
          cpus: '4.0'
        reservations:
          memory: 4G
          cpus: '2.0'
    networks:
      - nexora-network
    restart: unless-stopped

  # Microservices
  user-service:
    build:
      context: .
      dockerfile: microservices/user-service/Dockerfile
    environment:
      - SPRING_PROFILES_ACTIVE=enterprise
      - DATABASE_URL=postgresql://postgres-master:5432/nexora
      - REDIS_CLUSTER_URL=redis://redis-cluster-1:6379
    deploy:
      replicas: 20
      resources:
        limits:
          memory: 4G
          cpus: '2.0'
        reservations:
          memory: 2G
          cpus: '1.0'
    depends_on:
      - postgres-master
      - redis-cluster-1
    networks:
      - nexora-network
    restart: unless-stopped

  content-service:
    build:
      context: .
      dockerfile: microservices/content-service/Dockerfile
    environment:
      - SPRING_PROFILES_ACTIVE=enterprise
      - DATABASE_URL=postgresql://postgres-master:5432/nexora
      - ELASTICSEARCH_URL=http://es-master:9200
      - STORAGE_URL=http://storage-service:8080
    deploy:
      replicas: 30
      resources:
        limits:
          memory: 8G
          cpus: '4.0'
        reservations:
          memory: 4G
          cpus: '2.0'
    depends_on:
      - postgres-master
      - es-master
    networks:
      - nexora-network
    restart: unless-stopped

  notification-service:
    build:
      context: .
      dockerfile: microservices/notification-service/Dockerfile
    environment:
      - SPRING_PROFILES_ACTIVE=enterprise
      - KAFKA_BOOTSTRAP_SERVERS=kafka-1:9092,kafka-2:9092,kafka-3:9092
      - REDIS_CLUSTER_URL=redis://redis-cluster-1:6379
    deploy:
      replicas: 15
      resources:
        limits:
          memory: 4G
          cpus: '2.0'
        reservations:
          memory: 2G
          cpus: '1.0'
    depends_on:
      - kafka-1
      - redis-cluster-1
    networks:
      - nexora-network
    restart: unless-stopped

  payment-service:
    build:
      context: .
      dockerfile: microservices/payment-service/Dockerfile
    environment:
      - SPRING_PROFILES_ACTIVE=enterprise
      - DATABASE_URL=postgresql://postgres-master:5432/nexora
      - REDIS_CLUSTER_URL=redis://redis-cluster-1:6379
    deploy:
      replicas: 25
      resources:
        limits:
          memory: 4G
          cpus: '2.0'
        reservations:
          memory: 2G
          cpus: '1.0'
    depends_on:
      - postgres-master
      - redis-cluster-1
    networks:
      - nexora-network
    restart: unless-stopped

  analytics-service:
    build:
      context: .
      dockerfile: microservices/analytics-service/Dockerfile
    environment:
      - SPRING_PROFILES_ACTIVE=enterprise
      - DATABASE_URL=postgresql://postgres-replica-1:5432/nexora
      - ELASTICSEARCH_URL=http://es-master:9200
      - KAFKA_BOOTSTRAP_SERVERS=kafka-1:9092,kafka-2:9092,kafka-3:9092
    deploy:
      replicas: 10
      resources:
        limits:
          memory: 16G
          cpus: '8.0'
        reservations:
          memory: 8G
          cpus: '4.0'
    depends_on:
      - postgres-replica-1
      - es-master
      - kafka-1
    networks:
      - nexora-network
    restart: unless-stopped

volumes:
  # Database volumes
  postgres_master_data:
  postgres_replica1_data:
  postgres_replica2_data:
  
  # Redis cluster volumes
  redis_cluster1_data:
  redis_cluster2_data:
  redis_cluster3_data:
  
  # Kafka volumes
  kafka1_data:
  kafka2_data:
  kafka3_data:
  
  # Zookeeper volumes
  zookeeper1_data:
  zookeeper1_logs:
  zookeeper2_data:
  zookeeper2_logs:
  zookeeper3_data:
  zookeeper3_logs:
  
  # Elasticsearch volumes
  es_master_data:
  es_data1_data:
  es_data2_data:
  
  # Monitoring volumes
  prometheus_enterprise_data:
  grafana_enterprise_data:

networks:
  nexora-network:
    driver: bridge
    ipam:
      config:
        - subnet: 172.20.0.0/16
