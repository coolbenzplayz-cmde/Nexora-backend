apiVersion: apps/v1
kind: Deployment
metadata:
  name: nexora-frontend
  namespace: nexora
spec:
  replicas: 2
  selector:
    matchLabels:
      app: nexora-frontend
  template:
    metadata:
      labels:
        app: nexora-frontend
    spec:
      containers:
      - name: frontend
        image: nexora-frontend:latest
        ports:
        - containerPort: 3000
        resources:
          requests:
            memory: "256Mi"
            cpu: "100m"
          limits:
            memory: "512Mi"
            cpu: "500m"
        livenessProbe:
          httpGet:
            path: /
            port: 3000
          initialDelaySeconds: 30
          periodSeconds: 10
        readinessProbe:
          httpGet:
            path: /
            port: 3000
          initialDelaySeconds: 10
          periodSeconds: 5
---
apiVersion: v1
kind: Service
metadata:
  name: nexora-frontend
  namespace: nexora
spec:
  selector:
    app: nexora-frontend
  ports:
  - port: 80
    targetPort: 3000
  type: ClusterIP
