apiVersion: apps/v1
kind: Deployment
metadata:
  name: nexora-backend
  namespace: nexora
spec:
  replicas: 2
  selector:
    matchLabels:
      app: nexora-backend
  template:
    metadata:
      labels:
        app: nexora-backend
    spec:
      containers:
        - name: backend
          image: nexora-backend:latest
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 8080
          env:
            - name: SPRING_PROFILES_ACTIVE
              value: "prod"
            - name: DB_HOST
              valueFrom:
                secretKeyRef:
                  name: nexora-secrets
                  key: db-host
            - name: DB_PORT
              value: "5432"
            - name: DB_NAME
              valueFrom:
                secretKeyRef:
                  name: nexora-secrets
                  key: db-name
            - name: DB_USERNAME
              valueFrom:
                secretKeyRef:
                  name: nexora-secrets
                  key: db-username
            - name: DB_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: nexora-secrets
                  key: db-password
            - name: SPRING_DATA_REDIS_HOST
              valueFrom:
                secretKeyRef:
                  name: nexora-secrets
                  key: redis-host
            - name: SPRING_DATA_REDIS_PORT
              value: "6379"
            - name: SPRING_KAFKA_BOOTSTRAP_SERVERS
              valueFrom:
                secretKeyRef:
                  name: nexora-secrets
                  key: kafka-bootstrap-servers
            - name: JWT_SECRET
              valueFrom:
                secretKeyRef:
                  name: nexora-secrets
                  key: jwt-secret
          resources:
            requests:
              memory: "512Mi"
              cpu: "250m"
            limits:
              memory: "1Gi"
              cpu: "1000m"
          livenessProbe:
            httpGet:
              path: /actuator/health/liveness
              port: 8080
            initialDelaySeconds: 60
            periodSeconds: 10
            timeoutSeconds: 3
            failureThreshold: 6
          readinessProbe:
            httpGet:
              path: /actuator/health/readiness
              port: 8080
            initialDelaySeconds: 30
            periodSeconds: 5
            timeoutSeconds: 3
            failureThreshold: 6
---
apiVersion: v1
kind: Service
metadata:
  name: nexora-backend
  namespace: nexora
spec:
  selector:
    app: nexora-backend
  ports:
    - port: 80
      targetPort: 8080
  type: ClusterIP
