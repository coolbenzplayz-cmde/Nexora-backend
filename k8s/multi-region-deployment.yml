---
# Global Load Balancer with Geo-Based Routing
apiVersion: networking.istio.io/v1beta1
kind: DestinationRule
metadata:
  name: nexora-destination-rule
  namespace: nexora-global
spec:
  host: nexora-api-gateway-service
  trafficPolicy:
    loadBalancer:
      simple: ROUND_ROBIN
    connectionPool:
      tcp:
        maxConnections: 10000
      http:
        http1MaxPendingRequests: 10000
        maxRequestsPerConnection: 10
    circuitBreaker:
      consecutiveErrors: 3
      interval: 30s
      baseEjectionTime: 30s
      maxEjectionPercent: 50
    outlierDetection:
      consecutiveGatewayErrors: 5
      interval: 30s
      baseEjectionTime: 30s
      maxEjectionPercent: 50
  subsets:
  - name: primary
    labels:
      version: v1
      region: north-america
    trafficPolicy:
      loadBalancer:
        simple: ROUND_ROBIN
  - name: secondary
    labels:
      version: v1
      region: europe
    trafficPolicy:
      loadBalancer:
        simple: ROUND_ROBIN
  - name: tertiary
    labels:
      version: v1
      region: asia-pacific
    trafficPolicy:
      loadBalancer:
        simple: ROUND_ROBIN
---
# Global Service Mesh Configuration
apiVersion: security.istio.io/v1beta1
kind: PeerAuthentication
metadata:
  name: default
  namespace: nexora-global
spec:
  mtls:
    mode: STRICT
---
apiVersion: security.istio.io/v1beta1
kind: AuthorizationPolicy
metadata:
  name: nexora-authz
  namespace: nexora-global
spec:
  selector:
    matchLabels:
      app: nexora-api-gateway
  rules:
  - from:
    - source:
        principals: ["cluster.local/ns/istio-system/sa/istio-ingressgateway-service-account"]
  - to:
    - operation:
        methods: ["GET", "POST", "PUT", "DELETE"]
---
# Global Monitoring Configuration
apiVersion: v1
kind: ServiceMonitor
metadata:
  name: nexora-global-monitor
  namespace: nexora-global
  labels:
    app: nexora-monitor
spec:
  selector:
    matchLabels:
      app: nexora-api-gateway
  endpoints:
  - port: metrics
    interval: 30s
    path: /actuator/prometheus
---
# Global Alerting Rules
apiVersion: monitoring.coreos.com/v1
kind: PrometheusRule
metadata:
  name: nexora-global-alerts
  namespace: nexora-global
spec:
  groups:
  - name: nexora-global.rules
    rules:
    - alert: HighErrorRate
      expr: rate(http_requests_total{status=~"5.."}[5m]) > 0.1
      for: 5m
      labels:
        severity: critical
      annotations:
        summary: "High error rate detected"
        description: "Error rate is {{ $value }} errors per second"
    - alert: HighLatency
      expr: histogram_quantile(0.95, rate(http_request_duration_seconds_bucket[5m])) > 1
      for: 5m
      labels:
        severity: warning
      annotations:
        summary: "High latency detected"
        description: "95th percentile latency is {{ $value }} seconds"
    - alert: ServiceDown
      expr: up == 0
      for: 1m
      labels:
        severity: critical
      annotations:
        summary: "Service is down"
        description: "Service {{ $labels.instance }} is down"
---
# Global Autoscaling Configuration
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: nexora-api-gateway-global-hpa
  namespace: nexora-global
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: nexora-api-gateway-na
  minReplicas: 50
  maxReplicas: 500
  metrics:
  - type: Resource
    resource:
      name: cpu
      target:
        type: Utilization
        averageUtilization: 70
  - type: Resource
    resource:
      name: memory
      target:
        type: Utilization
        averageUtilization: 80
  - type: Pods
    pods:
      metric:
        name: http_requests_per_second
      target:
        type: AverageValue
        averageValue: "5000"
  behavior:
    scaleDown:
      stabilizationWindowSeconds: 300
      policies:
      - type: Percent
        value: 10
        periodSeconds: 60
    scaleUp:
      stabilizationWindowSeconds: 30
      policies:
      - type: Percent
        value: 100
        periodSeconds: 30
      - type: Pods
        value: 50
        periodSeconds: 30
      selectPolicy: Max
---
# Global Resource Quotas
apiVersion: v1
kind: ResourceQuota
metadata:
  name: nexora-global-quota
  namespace: nexora-global
spec:
  hard:
    requests.cpu: "5000"
    requests.memory: 20000Gi
    limits.cpu: "10000"
    limits.memory: 40000Gi
    persistentvolumeclaims: "500"
    services: "200"
    secrets: "500"
    configmaps: "500"
    count/deployments.apps: "100"
    count/pods: "10000"
---
# Global Network Policies
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: nexora-global-network-policy
  namespace: nexora-global
spec:
  podSelector: {}
  policyTypes:
  - Ingress
  - Egress
  ingress:
  - from:
    - namespaceSelector:
        matchLabels:
          name: istio-system
    - podSelector:
        matchLabels:
          app: nexora-api-gateway
    - podSelector:
        matchLabels:
          app: nexora-cdn
  egress:
  - to:
    - namespaceSelector:
        matchLabels:
          name: nexora-global
  - to: []
    ports:
    - protocol: TCP
      port: 53
    - protocol: UDP
      port: 53
  - to: []
    ports:
    - protocol: TCP
      port: 443
    - protocol: TCP
      port: 80
