# PostgreSQL Enterprise Configuration for 100M+ Users
# Optimized for high concurrency and massive scale

# CONNECTION SETTINGS
max_connections = 10000
superuser_reserved_connections = 100
listen_addresses = '*'
port = 5432

# MEMORY SETTINGS (for 128GB RAM server)
shared_buffers = 32GB
huge_pages = try
temp_buffers = 256MB
max_prepared_transactions = 2000
work_mem = 256MB
hash_mem_multiplier = 2.0
maintenance_work_mem = 2GB
autovacuum_work_mem = 1GB
max_stack_depth = 2MB
shared_memory_type = mmap
dynamic_shared_memory_type = posix

# WAL SETTINGS
wal_level = replica
fsync = on
synchronous_commit = remote_write
wal_sync_method = fdatasync
full_page_writes = on
wal_compression = on
wal_log_hints = on
wal_init_zero = on
wal_buffers = 64MB
wal_writer_delay = 200ms
wal_writer_flush_after = 1MB
commit_delay = 0
commit_siblings = 5

# CHECKPOINT SETTINGS
checkpoint_timeout = 15min
checkpoint_completion_target = 0.9
checkpoint_flush_after = 256kB
max_wal_size = 64GB
min_wal_size = 4GB
checkpoint_warning = 30s

# ARCHIVING SETTINGS
archive_mode = on
archive_command = 'cp %p /var/lib/postgresql/archive/%f'
archive_timeout = 300

# REPLICATION SETTINGS
max_wal_senders = 10
max_replication_slots = 10
wal_keep_size = 4GB
hot_standby = on
max_standby_archive_delay = 30s
max_standby_streaming_delay = 30s
wal_receiver_create_temp_slot = off
hot_standby_feedback = on
wal_receiver_status_interval = 10s
hot_standby_feedback = on
wal_receiver_timeout = 60s

# QUERY PLANNER
enable_bitmapscan = on
enable_hashagg = on
enable_hashjoin = on
enable_indexscan = on
enable_indexonlyscan = on
enable_material = on
enable_mergejoin = on
enable_nestloop = on
enable_parallel_append = on
enable_parallel_hash = on
enable_partition_pruning = on
enable_partitionwise_join = on
enable_partitionwise_aggregate = on
enable_seqscan = on
enable_sort = on
enable_tidscan = on

# PARALLELISM
max_parallel_workers_per_gather = 8
parallel_leader_participation = on
max_parallel_workers = 128
max_parallel_maintenance_workers = 8
parallel_tuple_cost = 0.1
parallel_setup_cost = 1000.0
min_parallel_table_scan_size = 8MB
min_parallel_index_scan_size = 8MB

# VACUUM SETTINGS
autovacuum = on
log_autovacuum_min_duration = 0
autovacuum_max_workers = 12
autovacuum_naptime = 10s
autovacuum_vacuum_threshold = 50000
autovacuum_vacuum_insert_threshold = 1000000
autovacuum_analyze_threshold = 50000
autovacuum_vacuum_scale_factor = 0.1
autovacuum_vacuum_insert_scale_factor = 0.2
autovacuum_analyze_scale_factor = 0.05
autovacuum_freeze_max_age = 200000000
autovacuum_multixact_freeze_max_age = 400000000
autovacuum_vacuum_cost_delay = 2ms
autovacuum_vacuum_cost_limit = 4000

# RESOURCE MANAGEMENT
statement_timeout = 300000
lock_timeout = 60000
idle_in_transaction_session_timeout = 600000
vacuum_freeze_min_age = 50000000
vacuum_freeze_table_age = 150000000
vacuum_multixact_freeze_min_age = 5000000
vacuum_multixact_freeze_table_age = 150000000
vacuum_cleanup_index_scale_factor = 0.1
vacuum_multixact_cleanup_age = 0

# LOGGING
logging_collector = on
log_directory = 'log'
log_filename = 'postgresql-%Y-%m-%d_%H%M%S.log'
log_file_mode = 0600
log_truncate_on_rotation = off
log_rotation_age = 1d
log_rotation_size = 100MB
syslog_facility = 'LOCAL0'
syslog_ident = 'postgres'
syslog_sequence_numbers = on
syslog_split_messages = on
event_source = 'PostgreSQL'

# LOG LEVELS
log_destination = 'stderr,csvlog'
log_min_messages = warning
log_min_error_statement = error
log_min_duration_statement = 1000
log_checkpoints = on
log_connections = on
log_disconnections = on
log_duration = on
log_error_verbosity = verbose
log_hostname = on
log_line_prefix = '%t [%p]: [%l-1] user=%u,db=%d,app=%a,client=%h '
log_lock_waits = on
log_parameter_max_length = -1
log_parameter_max_length_on_error = 0
log_replication_commands = on
log_statement = 'mod'
log_temp_files = 10MB
log_timezone = 'UTC'

# CLIENT CONNECTION DEFAULTS
default_text_search_config = 'pg_catalog.english'
search_path = '"$user", public'
row_security = on
default_table_access_method = 'heap'
default_tablespace = ''
temp_tablespaces = ''
default_toast_compression = 'pglz'
check_function_bodies = on
default_transaction_isolation = 'read committed'
default_transaction_read_only = off
default_transaction_deferrable = off
session_replication_role = 'origin'
statement_timeout = 0
lock_timeout = 0
idle_in_transaction_session_timeout = 0
vacuum_freeze_min_age = 50000000
vacuum_freeze_table_age = 150000000
vacuum_multixact_freeze_min_age = 5000000
vacuum_multixact_freeze_table_age = 150000000
vacuum_cleanup_index_scale_factor = 0.1
vacuum_multixact_cleanup_age = 0

# LOCALE AND FORMATTING
datestyle = 'iso, mdy'
intervalstyle = 'postgres'
timezone = 'UTC'
timezone_abbreviations = 'Default'
extra_float_digits = 1
client_encoding = sql_ascii

# SHARED PRELOAD LIBRARIES
shared_preload_libraries = 'pg_stat_statements,auto_explain,pg_buffercache,pg_stat_kcache,pg_prewarm,pg_repack,pgstattuple'

# EXTENSION SETTINGS
pg_stat_statements.max = 10000
pg_stat_statements.track = all
pg_stat_statements.track_utility = on
pg_stat_statements.save = on
auto_explain.log_min_duration = 1000
auto_explain.log_analyze = on
auto_explain.log_verbose = on
auto_explain.log_format = json
auto_explain.log_nested_statements = on
auto_explain.sample_rate = 0.1

# PARTITIONING
enable_partition_pruning = on
enable_partitionwise_join = on
enable_partitionwise_aggregate = on

# JIT COMPILATION
jit = on
jit_inline_above_cost = 500000
jit_optimize_above_cost = 500000

# OTHER SETTINGS
add_missing_from = off
array_nulls = on
backslash_quote = safe_encoding
default_with_oids = off
escape_string_warning = on
lo_compat_privileges = off
operator_precedence_warning = off
quote_all_identifiers = off
standard_conforming_strings = on
synchronize_seqscans = on
transform_null_equals = off
xmlbinary = base64
xmloption = content

# CUSTOM SETTINGS FOR NEXORA
# User table partitioning
default_partition_key = 'created_at'
partition_count = 100

# Index settings
maintenance_work_mem = 2GB
effective_cache_size = 96GB
random_page_cost = 1.1
effective_io_concurrency = 200

# Connection pooling
max_connections = 10000
superuser_reserved_connections = 100

# Performance tuning
seq_page_cost = 1.0
random_page_cost = 1.1
cpu_tuple_cost = 0.01
cpu_index_tuple_cost = 0.005
cpu_operator_cost = 0.0025
parallel_tuple_cost = 0.1
parallel_setup_cost = 1000.0
min_parallel_table_scan_size = 8MB
min_parallel_index_scan_size = 8MB

# Background writer
bgwriter_delay = 200ms
bgwriter_lru_maxpages = 100
bgwriter_lru_multiplier = 2.0
bgwriter_flush_after = 512kB

# Asynchronous commit
synchronous_commit = remote_write
wal_sync_method = fdatasync
wal_writer_delay = 200ms
wal_writer_flush_after = 1MB

# Statistics
track_activities = on
track_counts = on
track_io_timing = on
track_functions = all
track_activity_query_size = 1024
stats_temp_directory = 'pg_stat_tmp'

# Monitoring
log_min_duration_statement = 1000
log_checkpoints = on
log_connections = on
log_disconnections = on
log_lock_waits = on
log_temp_files = 10MB

# Recovery settings
recovery_min_apply_delay = 0
recovery_target_action = pause
recovery_target_inclusive = on
recovery_target_time = ''
recovery_target_xid = ''
recovery_target_lsn = ''
recovery_target_name = ''
primary_conninfo = 'host=postgres-master port=5432 user=replicator'
primary_slot_name = ''
promote_trigger_file = ''
recovery_min_apply_delay = 0

# Standby settings
hot_standby = on
max_standby_archive_delay = 30s
max_standby_streaming_delay = 30s
wal_receiver_create_temp_slot = off
hot_standby_feedback = on
wal_receiver_status_interval = 10s
wal_receiver_timeout = 60s
wal_retrieve_retry_interval = 5s
recovery_min_apply_delay = 0

# Logical replication
wal_level = replica
max_replication_slots = 10
max_wal_senders = 10
wal_keep_size = 4GB
track_commit_timestamp = off
